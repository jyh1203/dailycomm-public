<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyComm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#app">본문으로 건너뛰기</a>
    <div class="app-shell">
      <aside class="side-panel">
        <div class="brand-block">
          <span class="eyebrow">Daily Comm</span>
          <h1>Daily Comm Report</h1>
          <p>기사 선별, 초안, 검수를 빠르게 처리합니다.</p>
        </div>

        <nav class="side-nav" aria-label="Primary">
          <button class="nav-btn" data-page="dashboard" aria-label="Dashboard" title="대시보드">
            <span class="nav-btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 19.5h16" />
                <path d="M7 16V10.5" />
                <path d="M12 16V6.5" />
                <path d="M17 16v-3.5" />
              </svg>
            </span>
            <span class="nav-btn-copy">
              <strong>대시보드</strong>
              <small>현황</small>
            </span>
          </button>
          <button class="nav-btn" data-page="inbox" aria-label="Article Inbox" title="기사 인박스">
            <span class="nav-btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4.5 7.5h15" />
                <path d="M4.5 12h15" />
                <path d="M4.5 16.5h9" />
                <path d="M17.5 16.5h2" />
              </svg>
            </span>
            <span class="nav-btn-copy">
              <strong>인박스</strong>
              <small>분류</small>
            </span>
          </button>
          <button class="nav-btn" data-page="builder" aria-label="Report Builder" title="리포트 빌더">
            <span class="nav-btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M5 18.5h5.25L18.5 10.25 13.75 5.5 5.5 13.75V19.5z" />
                <path d="M12.75 6.5l4.75 4.75" />
              </svg>
            </span>
            <span class="nav-btn-copy">
              <strong>빌더</strong>
              <small>편집</small>
            </span>
          </button>
          <button class="nav-btn" data-page="kakao" aria-label="Kakao Preview" title="카카오 프리뷰">
            <span class="nav-btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M5 6.75A2.75 2.75 0 0 1 7.75 4h8.5A2.75 2.75 0 0 1 19 6.75v5.5A2.75 2.75 0 0 1 16.25 15H11l-4.5 3v-3H7.75A2.75 2.75 0 0 1 5 12.25z" />
              </svg>
            </span>
            <span class="nav-btn-copy">
              <strong>카카오</strong>
              <small>검수</small>
            </span>
          </button>
          <button class="nav-btn" data-page="settings" aria-label="Settings" title="설정">
            <span class="nav-btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 7.75A4.25 4.25 0 1 0 12 16.25A4.25 4.25 0 1 0 12 7.75Z" />
                <path d="M12 3.75v1.5" />
                <path d="M12 18.75v1.5" />
                <path d="M20.25 12h-1.5" />
                <path d="M5.25 12h-1.5" />
                <path d="M17.84 6.16l-1.06 1.06" />
                <path d="M7.22 16.78l-1.06 1.06" />
                <path d="M17.84 17.84l-1.06-1.06" />
                <path d="M7.22 7.22L6.16 6.16" />
              </svg>
            </span>
            <span class="nav-btn-copy">
              <strong>설정</strong>
              <small>운영</small>
            </span>
          </button>
        </nav>

        <section class="runtime-card" id="runtime-card">
          <div class="runtime-head">
            <p class="runtime-label">현황판 (STATUS)</p>
            <button class="ghost-btn runtime-toggle" id="runtime-toggle" type="button" aria-expanded="false" aria-controls="runtime-details" hidden>펼치기</button>
          </div>
          <div class="runtime-summary-compact">
            <span>리포트/전체 기사</span>
            <strong id="runtime-compact">-</strong>
          </div>
          <div class="runtime-details" id="runtime-details">
            <div class="runtime-grid">
              <div class="runtime-stat runtime-stat-wide">
                <span>리포트/전체 기사</span>
                <strong id="runtime-usable">-</strong>
              </div>
              <div class="runtime-stat">
                <span>주요/업계</span>
                <strong id="runtime-report">-</strong>
              </div>
              <div class="runtime-stat">
                <span>분할 메시지</span>
                <strong id="runtime-segments">-</strong>
              </div>
            </div>
            <p class="runtime-footnote">마지막 수집: <strong id="runtime-generated">-</strong></p>
            <p class="runtime-status" id="runtime-status" role="status" aria-live="polite" aria-atomic="true" hidden>Loading</p>
          </div>
        </section>
      </aside>

      <div class="workspace">
        <header class="workspace-header">
          <div>
            <p class="eyebrow" id="workspace-kicker">Daily Comm</p>
            <h2 id="workspace-title">대시보드</h2>
            <p class="workspace-subtitle" id="workspace-subtitle">오늘 처리할 일만 보여줍니다.</p>
          </div>
          <div class="workspace-actions">
            <div class="date-pill" id="header-date">-</div>
            <button class="ghost-btn" id="header-open-report" aria-label="Open Report">리포트 열기</button>
          </div>
        </header>

        <main id="app" tabindex="-1"></main>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
